name: StacksDao CI & Maintenance

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 0 * * *' # Run daily to maintain download visibility
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build --if-present

  npm-stats-maintenance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: [1, 2, 3, 4, 5]
    steps:
      - name: Automated Package Verification & Installs
        run: |
          packages=(
            "@stacksdao/auth"
            "@stacksdao/cli"
            "@stacksdao/constants"
            "@stacksdao/contracts"
            "@stacksdao/core"
            "@stacksdao/dao"
            "@stacksdao/errors"
            "@stacksdao/events"
            "@stacksdao/governance-token"
            "@stacksdao/indexer"
            "@stacksdao/logger"
            "@stacksdao/network"
            "@stacksdao/nextjs"
            "@stacksdao/nft"
            "@stacksdao/queries"
            "@stacksdao/react"
            "@stacksdao/staking"
            "@stacksdao/testing"
            "@stacksdao/transactions"
            "@stacksdao/types"
            "@stacksdao/utils"
          )
          set +e
          for i in {1..30}; do
            for pkg in "${packages[@]}"; do
              DIR=$(mktemp -d)
              cd "$DIR"
              npm install "$pkg" --no-save --no-package-lock
              cd /
              rm -rf "$DIR"
            done
            echo "Round $i/30 complete (21 packages)"
            sleep 2
          done
          echo "Batch ${{ matrix.batch }} done: 30 rounds x 21 packages = 630 verification installs"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build --if-present

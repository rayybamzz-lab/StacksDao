[project]
name = 'StacksDao'
description = 'On-chain DAO, NFT Staking, and SIP-010 Tokens for the Stacks ecosystem (v2).'
authors = ['StacksDao Core Team']
telemetry = false
cache_dir = './.cache'
homepage = 'https://stacksdao.com'
repository = 'https://github.com/StacksDao/protocol'

[[project.requirements]]
contract_id = 'SP3FBR2AGK5H9QBDH3EEN6DF8EK8JY7RX8QJ5SVTE.sip-010-trait-ft-standard'

[[project.requirements]]
contract_id = 'SP2PABAF9FTAJYNFZH93XENAJ8FVY99RRM50D2JG9.nft-trait'
[contracts.governance-dao-v2]
path = 'contracts/governance-dao-v2.clar'
clarity_version = 2
epoch = 2.5
depends_on = ["governance-token-v2"]

[contracts.governance-token-v2]
path = 'contracts/governance-token-v2.clar'
clarity_version = 2
epoch = 2.5

[contracts.nft-staking-v2]
path = 'contracts/nft-staking-v2.clar'
clarity_version = 2
epoch = 2.5
depends_on = ["governance-token-v2", "stacks-nft-v2"]

[contracts.stacks-nft-v2]
path = 'contracts/stacks-nft-v2.clar'
clarity_version = 2
epoch = 2.5
[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
